<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創薬エコシステム 職業診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#fff9f4;--card:#ffffff;--border:#f0e6d8;--text:#2d2015;--sub:#9a8070;--acc:#ff6b35;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(255,107,53,0.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(100,180,255,0.06) 0%,transparent 50%);pointer-events:none;}
.wrap{max-width:560px;width:100%;position:relative;z-index:1;}
.intro{text-align:center;animation:up .45s ease;}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.intro h1{font-family:'M PLUS Rounded 1c',sans-serif;font-size:clamp(19px,5vw,27px);font-weight:800;line-height:1.4;margin-bottom:8px;}
.intro h1 span{background:linear-gradient(135deg,#ff6b35,#ff9a5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.intro p{font-size:13px;color:var(--sub);margin-bottom:18px;line-height:1.7;}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
.char-chip{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 10px;text-align:center;}
.char-chip svg{animation:float 3s ease-in-out infinite;}
.char-chip:nth-child(2) svg{animation-delay:.4s;}
.char-chip:nth-child(3) svg{animation-delay:.8s;}
.char-chip:nth-child(4) svg{animation-delay:1.2s;}
.chip-name{font-size:12px;font-weight:700;color:var(--text);margin-top:6px;}
.chip-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.start-btn{background:linear-gradient(135deg,#ff6b35,#ff9a5c);border:none;border-radius:16px;padding:16px 48px;color:#fff;font-size:16px;font-weight:900;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(255,107,53,0.35);width:100%;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,107,53,0.45);}
.prog-wrap{margin-bottom:18px;}
.prog-top{display:flex;justify-content:space-between;margin-bottom:7px;}
.prog-label{font-size:12px;font-weight:700;color:var(--sub);}
.prog-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#ff6b35,#ff9a5c);border-radius:6px;transition:width .4s ease;}
.qcard{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:26px 22px;box-shadow:0 4px 24px rgba(0,0,0,0.06);animation:up .3s ease;}
.q-tag{display:inline-flex;align-items:center;gap:6px;background:#fff4ef;border:1px solid #ffd4c0;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#ff6b35;margin-bottom:13px;}
.q-text{font-size:clamp(15px,3.5vw,19px);font-weight:900;line-height:1.5;color:var(--text);margin-bottom:18px;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:#fafafa;border:2px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;font-size:13.5px;color:var(--text);font-family:'Noto Sans JP',sans-serif;text-align:left;transition:all .18s ease;line-height:1.5;}
.opt:hover{background:#fff4ef;border-color:#ff9a5c;transform:translateX(5px);}
.opt-em{font-size:20px;flex-shrink:0;}
.result-wrap{animation:up .45s ease;}
.result-hero{text-align:center;background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:28px 22px 20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);margin-bottom:13px;position:relative;overflow:hidden;}
.result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--rc-light),transparent 65%);}
.r-char{position:relative;display:inline-block;animation:float 3s ease-in-out infinite;}
.r-type{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--rc);text-transform:uppercase;margin-bottom:5px;position:relative;}
.r-title{font-family:'M PLUS Rounded 1c',sans-serif;font-size:clamp(19px,5vw,25px);font-weight:800;color:var(--text);margin-bottom:4px;position:relative;}
.r-sub{font-size:13px;font-weight:700;color:var(--rc);margin-bottom:16px;position:relative;}
.r-msg{background:#fafafa;border-radius:14px;padding:15px 17px;font-size:13px;line-height:1.9;color:var(--sub);text-align:left;position:relative;}
.r-tags{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 0;justify-content:center;position:relative;}
.r-tag{background:#fff4ef;border:1.5px solid #ffd4c0;color:#ff6b35;font-size:12px;font-weight:700;padding:4px 13px;border-radius:20px;}
.score-section{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;margin-bottom:13px;}
.score-section h3{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--sub);text-transform:uppercase;margin-bottom:13px;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slabel{width:58px;font-size:12px;color:var(--sub);text-align:right;flex-shrink:0;}
.strack{flex:1;height:10px;background:var(--border);border-radius:10px;overflow:hidden;}
.sfill{height:100%;border-radius:10px;transition:width 1s ease .3s;}
.sval{width:18px;font-size:12px;color:var(--sub);font-weight:700;}
.retry-btn{width:100%;background:transparent;border:2px solid var(--border);border-radius:14px;padding:13px;color:var(--sub);font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;}
.retry-btn:hover{border-color:#ff9a5c;color:#ff6b35;background:#fff4ef;}
.conf{position:fixed;inset:0;pointer-events:none;z-index:999;}
.cp{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>

    <h1>あなたの性格から<br><span>創薬のポジション</span>を診断！</h1>
    <p>難しい知識は一切いらない。日常の「あるある」6問に答えるだけ。</p>
    <div class="char-grid">${chips.map(c=>`<div class="char-chip">${CHARS[c.k](80)}<div class="chip-name">${c.name}</div><div class="chip-sub">${c.sub}</div></div>`).join('')}</div>
    <button class="start-btn" onclick="go('quiz')">▶ 診断スタート（全6問）</button>
  </div>`;
}

function quizHTML(){
  const q=QS[cur];
  const pct=Math.round((cur/QS.length)*100);
  return `<div>
    <div class="prog-wrap">
      <div class="prog-top"><span class="prog-label">Q${cur+1} / ${QS.length}</span><span class="prog-label">${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard">
      <div class="q-tag">${q.tag}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${q.opts.map(o=>`<button class="opt" onclick="pick('${o.t}')"><span class="opt-em">${o.em}</span><span>${o.text}</span></button>`).join('')}</div>
    </div>
  </div>`;
}

function resultHTML(){
  const winner=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const r=TYPES[winner];
  const total=QS.length;
  const bars=Object.entries(TYPES).map(([k,v])=>{
    const pct=Math.round((scores[k]/total)*100);
    return `<div class="srow"><span class="slabel">${v.scoreName}</span><div class="strack"><div class="sfill" style="width:${pct}%;background:${v.scoreColor}"></div></div><span class="sval">${scores[k]}</span></div>`;
  }).join('');
  return `<div class="result-wrap" style="--rc:${r.rc};--rc-light:${r.rcLight}">
    <div class="result-hero">
      <div class="r-char">${CHARS[winner](110)}</div>
      <div class="r-type">${r.type}</div>
      <div class="r-title">${r.title}</div>
      <div class="r-sub">— ${r.sub} —</div>
      <div class="r-msg">${r.msg}</div>
      <div class="r-tags">${r.tags.map(t=>`<span class="r-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="score-section"><h3>📊 あなたのスコア分布</h3>${bars}</div>
    <button class="retry-btn" onclick="retry()">🔄 もう一度やってみる</button>
  </div>`;
}

function go(s){state=s;render();}
function pick(t){
  scores[t]++;cur++;
  if(cur>=QS.length){state='result';render();setTimeout(fireConf,400);}
  else render();
}
function retry(){scores={A:0,B:0,C:0,D:0};cur=0;state='intro';render();}
function fireConf(){
  const w=document.createElement('div');w.className='conf';document.body.appendChild(w);
  const cols=['#ff6b35','#22c55e','#3b82f6','#ec4899','#f59e0b','#a78bfa'];
  for(let i=0;i<65;i++){
    const el=document.createElement('div');el.className='cp';
    el.style.cssText=`left:${Math.random()*100}%;top:-12px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    w.appendChild(el);
  }
  setTimeout(()=>w.remove(),4000);
}
render();
</script>
</body>
</html>
